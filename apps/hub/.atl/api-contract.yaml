  # ==================== BILLING ====================
  /billing/documents/{documentId}/signed-url:
    get:
      tags: [billing, Billing]
      summary: Obtener URL firmada para descargar PDF de factura o contrato (TTL 5 min)
      description: |
        **Propósito**: Genera una URL pre-firmada de corta duración (5 minutos) para descargar
        el PDF de un documento de billing almacenado en el storage del backend.

        **Proceso**: Utilizado principalmente tras completar el onboarding. El `submitDraft`
        devuelve `documents.invoiceId` y `documents.contractId` — ambos son IDs de documento
        que se pasan a este endpoint para obtener la URL de descarga.
        También usado desde el módulo `billing/` para descargar documentos existentes.

        **Precondiciones**: Sesión activa (access token válido). El `documentId` debe
        pertenecer al tenant del usuario autenticado.

        **Notas**: La URL expira a los 5 minutos (`expiresAt` en la respuesta). Para descargar
        después, llamar nuevamente al endpoint para obtener una nueva URL. Devuelve 404 si
        el documento no existe o no pertenece al tenant.
      operationId: getSignedDocumentUrl
      parameters:
        - { name: documentId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: URL firmada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignedUrlResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /billing/payment-method:
    get:
      tags: [billing, Billing]
      operationId: getPaymentMethod
      summary: Obtener el método de pago vigente del tenant
      description: |
        **Propósito**: Devuelve el método de pago registrado actualmente para el tenant
        (tarjeta tokenizada via Bancard), o `null` si no hay ninguno registrado.

        **Proceso**: Consultado por `PaymentMethodSection` en `Settings > Billing` para
        mostrar la tarjeta actual (marca, últimos 4 dígitos, fecha de expiración).

        **Precondiciones**: Sesión activa con rol `TenantAdmin` o `SuperAdmin`.

        **Notas**: **Stub actual** — el backend retorna siempre `{ paymentMethod: null }`
        en esta versión. La integración real con tokenización de tarjetas Bancard es trabajo
        futuro. El campo `paymentMethod` puede ser `null` legítimamente cuando no hay tarjeta.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Método de pago (puede ser null)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentMethodResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [billing, Billing]
      operationId: requestPaymentMethodChange
      summary: Solicitar cambio de método de pago (contact-first)
      description: |
        **Propósito**: Registra una solicitud de actualización del método de pago y notifica
        al equipo de Corehub. No modifica el método de pago actual inmediatamente.

        **Proceso**: Accionado desde `Settings > Billing > PaymentMethodSection` al hacer
        clic en "Actualizar método de pago". Modelo contact-first: el equipo de Corehub
        contactará al tenant para procesar el cambio de tarjeta.

        **Precondiciones**: Sesión activa con rol `TenantAdmin` o `SuperAdmin`. No debe
        existir ya una solicitud pendiente.

        **Notas**: **Stub actual** — el backend acepta la solicitud pero no la procesa
        automáticamente. Devuelve 409 si ya hay una solicitud pendiente. La respuesta incluye
        un `id` de solicitud para seguimiento.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '202':
          description: Solicitud aceptada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentMethodChangeRequestResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /billing/invoices:
    get:
      tags: [billing, Billing]
      operationId: listInvoices
      summary: Listar facturas del tenant paginadas en orden descendente
      description: |
        **Propósito**: Devuelve el historial de facturas del tenant paginado, ordenado
        por fecha de emisión descendente (más recientes primero).

        **Proceso**: Consultado por `InvoicesSection` en `Settings > Billing` para mostrar
        el historial de facturación. Cada factura puede tener asociado un `documentId` para
        descargar el PDF via `GET /billing/invoices/{id}/signed-url`.

        **Precondiciones**: Sesión activa con rol `TenantAdmin` o `SuperAdmin`.

        **Notas**: **Stub actual** — el backend retorna siempre una lista vacía (`items: []`,
        `total: 0`) en esta versión. La paginación usa `page` (desde 1) y `pageSize` (máx 100,
        default 10). Los estados de factura son: `paid`, `pending`, `overdue`, `cancelled`.
      security:
        - bearerAuth: []
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: pageSize, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 10 } }
      responses:
        '200':
          description: Lista de facturas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /billing/invoices/{invoiceId}/signed-url:
    get:
      tags: [billing, Billing]
      operationId: getInvoiceSignedUrl
      summary: Obtener URL firmada para descargar PDF de factura (TTL 5 min)
      description: |
        **Propósito**: Genera una URL pre-firmada de corta duración (5 min) para descargar
        el PDF de una factura específica del tenant.

        **Proceso**: Accionado desde `InvoicesSection` al hacer clic en el botón de descarga
        junto a una factura. El `invoiceId` proviene del campo `id` en `GET /billing/invoices`.

        **Precondiciones**: Sesión activa con rol `TenantAdmin` o `SuperAdmin`. La factura
        debe existir y tener un documento PDF asociado (`documentId` no nulo).

        **Notas**: **Stub actual** — el backend retorna siempre 404 en esta versión.
        La generación real de facturas PDF es trabajo futuro. Para documentos del onboarding
        (factura de bienvenida, contrato), usar `GET /billing/documents/{documentId}/signed-url`.
      security:
        - bearerAuth: []
      parameters:
        - { name: invoiceId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: URL firmada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignedUrlResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ==================== WELL-KNOWN ====================
  /.well-known/jwks.json:
    get:
      operationId: getJwks
      summary: Obtener claves públicas JWT (JWKS) para verificación de tokens
      description: |
        **Propósito**: Devuelve las claves públicas RSA activas para verificar la firma de
        los JWTs emitidos por el servicio IAM, siguiendo el estándar RFC 7517 (JWKS).

        **Proceso**: Endpoint de descubrimiento estándar. Consumido por proxies, API gateways
        y otros servicios que necesiten verificar tokens independientemente del IAM service.
        El frontend **no** llama a este endpoint directamente — la verificación de firma
        ocurre server-side.

        **Precondiciones**: Ninguna — endpoint público, sin autenticación.

        **Notas**: Soporta rotación de claves: pueden coexistir hasta 2 claves con `kid` distinto.
        Las respuestas son cacheables (`Cache-Control: public, max-age=300`). El campo `kid` en
        los JWTs emitidos referencia la clave de firma usada en este JWKS.
      tags: [well-known, Sistema]
      security: []
      responses:
        '200':
          description: JSON Web Key Set per RFC 7517
          headers:
            Cache-Control:
              schema: { type: string }
              description: 'public, max-age=300'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonWebKeySet'
              example:
                keys:
                  - kty: RSA
                    use: sig
                    alg: RS256
                    kid: '2026-04-01'
                    n: '0vx7agoebGcQSuuPiLJXZptN9...'
                    e: AQAB

  # ==================== WEBHOOKS ====================
  /webhooks/bancard:
    post:
      operationId: bancardWebhook
      summary: Recibir notificación de pago de Bancard (server-to-server)
      description: |
        **Propósito**: Recibe las notificaciones asíncronas de Bancard cuando el estado de
        un pago cambia (aprobado, rechazado, revertido). Actualiza el estado del pago en la
        base de datos para que el polling del frontend lo detecte.

        **Proceso**: NO consumido por el frontend — es la integración server-to-server entre
        Bancard y el IAM service. Cuando un usuario completa o cancela el pago en el checkout
        de Bancard, este webhook es el mecanismo por el que el backend se entera del resultado.

        **Precondiciones**: Autenticado por firma HMAC-SHA256 del cuerpo del request en el
        header `X-Bancard-Signature` usando el shared secret configurado. Sin `Authorization: Bearer`.

        **Notas**:
        - Idempotencia interna por `(process_id, status)` — múltiples webhooks idénticos se
          procesan una sola vez (tabla `webhook_events`).
        - El endpoint **SIEMPRE** responde 200 incluso si el procesamiento interno falla.
          Bancard reintenta ante cualquier respuesta != 200.
        - Solo devuelve 4xx ante firma HMAC inválida o body inparseable.
        - El campo `process_id` mapea al `paymentId` devuelto por `POST /onboarding/draft/{draftId}/payment/initiate`.
      tags: [webhooks, Webhooks]
      security: []
      parameters:
        - name: X-Bancard-Signature
          in: header
          required: true
          schema: { type: string }
          description: HMAC-SHA256 del body request usando el shared secret de Bancard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BancardWebhookPayload'
      responses:
        '200':
          description: Webhook recibido (incluso si el procesamiento interno falla)
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received: { type: boolean, enum: [true] }
        '400':
          description: Body inparseable
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '401':
          description: Firma HMAC inválida
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
