  # ==================== USERS ====================
  /users/me:
    patch:
      tags: [identity, Perfil]
      operationId: updateCurrentUser
      summary: Actualizar nombre completo y teléfono del usuario autenticado
      description: |
        **Propósito**: Permite al usuario autenticado actualizar su nombre de visualización
        y número de teléfono. Emite un nuevo access token con los claims actualizados.

        **Proceso**: Accionado desde `Settings > Profile` (si existe) o desde cualquier
        pantalla de edición de perfil. La respuesta incluye un nuevo access token para que
        el frontend lo reemplace en memoria sin necesidad de un refresh adicional.

        **Precondiciones**: Sesión activa (cualquier rol). `fullName` mínimo 2 caracteres,
        máximo 100. `phone` en formato E.164 (ej. `+595981000000`).

        **Notas**: El nuevo access token incluye el claim `phone` actualizado y el `name`
        actualizado. El frontend debe reemplazar el access token en memoria inmediatamente
        con el devuelto en la respuesta para mantener los claims sincronizados.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              fullName: Ana Pereira
              phone: '+595981000000'
      responses:
        '200':
          description: Profile updated, new access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponse'
              example:
                user:
                  id: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
                  email: ana@empresa-acme.com
                  fullName: Ana Pereira
                  phone: '+595981000000'
                accessToken: 'eyJhbGc...'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

